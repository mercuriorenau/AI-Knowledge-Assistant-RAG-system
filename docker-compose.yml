services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CHROMA_PERSIST_DIR: /app/chroma_data
      UPLOAD_DIR: /app/backend/storage/uploads
    volumes:
      - chroma_data:/app/chroma_data
      - uploads:/app/backend/storage/uploads

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api

volumes:
  chroma_data:
  uploads:
